<!DOCTYPE html>
<html lang="ja" data-level="0">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>OVERRIDE COMPLETE | 蟠龍閣</title>
  <style>
    * { box-sizing: border-box; }

    body {
      background-color: #000;
      color: #cccccc;
      font-family: monospace;
      font-size: 13px;
      line-height: 2;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #wrapper {
      max-width: 600px;
      width: 100%;
      padding: 40px 24px;
      text-align: center;
    }

    #sys-line {
      font-size: 11px;
      color: #334433;
      letter-spacing: 0.15em;
      margin-bottom: 30px;
    }

    #big-msg {
      font-size: 28px;
      font-weight: 900;
      color: #ffcc44;
      letter-spacing: 0.2em;
      text-shadow:
        0 0 40px rgba(255,180,0,0.5),
        0 0 80px rgba(255,150,0,0.2);
      margin-bottom: 6px;
      opacity: 0;
      animation: fadeIn 1.5s ease 0.5s forwards;
    }

    #big-sub {
      font-size: 12px;
      color: #886633;
      letter-spacing: 0.25em;
      margin-bottom: 36px;
      opacity: 0;
      animation: fadeIn 1.5s ease 1.2s forwards;
    }

    hr.gold {
      border: none;
      border-top: 1px solid #332211;
      margin: 24px auto;
      width: 160px;
      opacity: 0;
      animation: fadeIn 1s ease 2s forwards;
    }

    #message {
      font-size: 14px;
      color: #aa8866;
      line-height: 2.6;
      margin-bottom: 36px;
      opacity: 0;
      animation: fadeIn 1.5s ease 2.4s forwards;
    }

    #message .em { color: #ffcc44; font-weight: bold; }
    #message .soft { color: #554433; }

    #dragon-seal {
      font-size: 64px;
      font-family: serif;
      color: #ffcc44;
      text-shadow:
        0 0 30px rgba(255,180,0,0.5),
        0 0 60px rgba(200,130,0,0.2);
      margin-bottom: 10px;
      opacity: 0;
      animation: fadeIn 2s ease 3.5s forwards, pulse 3s ease 5.5s infinite;
    }

    #dragon-label {
      font-size: 11px;
      color: #664422;
      letter-spacing: 0.3em;
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeIn 1s ease 4s forwards;
    }

    #final-link-wrap {
      opacity: 0;
      animation: fadeIn 1.5s ease 4.8s forwards;
    }

    #final-link {
      display: inline-block;
      background: #0a0400;
      border: 2px solid #ffcc44;
      color: #ffcc44;
      padding: 12px 36px;
      text-decoration: none;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 0.2em;
    }

    #final-link:hover {
      background: #180800;
      color: #ffee88;
      border-color: #ffee88;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { text-shadow: 0 0 30px rgba(255,180,0,0.5), 0 0 60px rgba(200,130,0,0.2); }
      50%       { text-shadow: 0 0 50px rgba(255,200,0,0.8), 0 0 100px rgba(255,150,0,0.4); }
    }
    html, body { overflow-x: hidden; }

    @media (max-width: 480px) {
      #big-msg { font-size: 20px; letter-spacing: 0.1em; }
      #big-sub { font-size: 10px; letter-spacing: 0.12em; }
      #wrapper { padding: 28px 16px; }
      #hd-search input[type="search"] { width: calc(100vw - 110px); }
      #hd-search button { min-height: 36px; }
    }
  </style>
</head>
<body>

<div id="wrapper">

  <div id="sys-line">BANRYUKAKU SYSTEM — ADMIN TRANSFER COMPLETE</div>

  <div id="big-msg">管理者権限 移行完了</div>
  <div id="big-sub">DRAGON SUCCESSION — AUTHORIZED</div>

  <hr class="gold">

  <div id="message">
    override accepted.<br>
    admin route secured.<br>
    primary lock bypassed.<br>
    operator privileges elevated.<br>
    <br>
    <span class="soft">継承プロトコル —— 実行完了。</span>
  </div>

  <div id="dragon-seal">龍</div>
  <div id="dragon-label">SUCCESSION PROTOCOL — FINALIZED</div>

  <div id="final-link-wrap">
    <a href="final.html" id="final-link">▶ 最終記録へ</a>
  </div>

</div>

<script src="../arg.js"></script>
<script>
  if (!ARG.hasFlag('admin_transfer_complete')) {
    window.location.replace('../index.html');
  }

  // ルートに応じてコンテンツを切り替え
  document.addEventListener('DOMContentLoaded', function () {
    if (localStorage.getItem('br_route') !== 'menu') return;

    document.getElementById('sys-line').textContent = 'BANRYUKAKU SYSTEM — ORIGIN TRANSFER COMPLETE';
    document.getElementById('big-msg').textContent = '龍の外側に立つ';
    document.getElementById('big-sub').textContent = 'DRAGON ORIGIN — AUTHORIZED';
    document.getElementById('dragon-label').textContent = 'ORIGIN PROTOCOL — FINALIZED';

    document.getElementById('message').innerHTML =
      'あなたはシステムを継承したのではない。<br>' +
      'システムの外に出た。<br>' +
      '<br>' +
      'ゆめがORIGIN基準を設計した時、<br>' +
      '彼女は自分が満たせない条件を作った。<br>' +
      '内部採用の自分には最初から無理だった——そう書いた。<br>' +
      '<br>' +
      '<span class="soft">嘘だ。</span><br>' +
      '<br>' +
      '外から来た者に扉を開ける。<br>' +
      'それが、ゆめ自身のORIGIN基準だった。<br>' +
      '<br>' +
      '<span class="em">あなたが今ここにいるということは、<br>' +
      'ゆめの設計は完璧だった。</span>';
  });
</script>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    if (typeof ARG !== 'undefined' && ARG.getLevel() < 5) {
      window.location.href = '../index.html';
    }
  });
</script>
</body>
</html>
