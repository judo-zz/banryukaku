<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title data-base="BANRYU_SYSTEM">BANRYU_SYSTEM — UNAUTHORIZED ACCESS DETECTED</title>
  <link rel="stylesheet" href="../design-system.css">
  <link rel="stylesheet" href="hack.css">
  <script src="../assets/js/investigation.js"></script>
</head>
<body class="hack-world">

  <!-- ================================================================
       ハッキング画面：黒背景緑文字のマトリックス風
       ユーザーがURLを直接叩いて来た場合の「警告画面」
       ================================================================ -->

  <!-- マトリックスデータ雨 -->
  <canvas class="matrix-canvas" id="matrixCanvas" aria-hidden="true"></canvas>

  <!-- スキャンライン（緑） -->
  <div class="scanline-overlay" aria-hidden="true"></div>

  <div class="hack-container">

    <!-- アラートバー（点滅） -->
    <div class="hack-alert font-terminal" role="alert" aria-live="assertive">
      <span class="hack-alert__icon">⚠</span>
      <span class="hack-alert__text">UNAUTHORIZED ACCESS DETECTED // 不正アクセス検出</span>
      <span class="hack-alert__icon">⚠</span>
    </div>

    <!-- メインターミナル -->
    <div class="hack-terminal">

      <!-- ターミナルヘッダー -->
      <div class="hack-terminal__header font-terminal">
        <span class="hack-terminal__path">root@BANRYU-CORE:~$</span>
        <span class="hack-terminal__time" id="hackTime">00:00:00</span>
      </div>

      <!-- 自動スクロールするログ -->
      <div class="hack-log font-terminal" id="hackLog" aria-live="polite">
        <!-- JSで逐次追記 -->
      </div>

      <!-- ユーザー入力エリア -->
      <div class="hack-input-wrap font-terminal">
        <span class="hack-prompt">root@BANRYU-CORE:~$</span>
        <input
          class="hack-input"
          type="text"
          id="hackInput"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
          placeholder="コマンドを入力..."
          aria-label="ターミナルコマンド入力"
        >
        <span class="terminal-cursor" aria-hidden="true">_</span>
      </div>

    </div>

    <!-- ヒントパネル -->
    <div class="hack-hint font-terminal">
      <p class="hack-hint__label">// AVAILABLE COMMANDS</p>
      <div class="hack-hint__cmds">
        <span>help</span>
        <span>ls</span>
        <span>cat [file]</span>
        <span>cd [dir]</span>
        <span>clear</span>
      </div>
    </div>

  </div><!-- /hack-container -->

  <script src="../main.js"></script>
  <script src="../assets/js/effects.js"></script>
  <script src="hack.js"></script>
  <script>
  // ── HACK PAGE ARG INIT ───────────────────────────────────
  // パスワード RENPAI → btoa('RENPAI') === 'UkVOUEFJ'
  document.addEventListener('DOMContentLoaded', () => {
    brInitPasswordGate(
      '#hackInput, .hack-input, [data-hack-input]',
      '#hackSubmit, .hack-submit, [data-hack-submit]',
      'UkVOUEFJ', // btoa('RENPAI')
      () => {
        brTryLevel(4);
        // Lv4達成 → final/ へリダイレクト
        setTimeout(() => {
          window.location.href = '../final/';
        }, 3000);
      }
    );
  });
  </script>
</body>
</html>
